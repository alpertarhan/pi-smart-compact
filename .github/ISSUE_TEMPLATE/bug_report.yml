name: Bug report
description: Report a reproducible pi-smart-compact problem
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough context to reproduce the issue without sharing secrets or private session content.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: pi-smart-compact version
      placeholder: "7.13.1"
    validations:
      required: true
  - type: input
    id: pi-version
    attributes:
      label: Pi Coding Agent version
      placeholder: "0.75.5"
    validations:
      required: false
  - type: dropdown
    id: surface
    attributes:
      label: Integration surface
      options:
        - /smart-compact command
        - smart_compact tool
        - session_before_compact auto-trigger
        - metrics/dashboard
        - install/build
        - other
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Configure ...
        2. Run ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: Relevant configuration
      description: Paste only non-secret `smartCompact` settings.
      render: json
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs or error output
      description: Redact tokens, private repository content, and confidential session data.
      render: shell
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        OS:
        Bun:
        Node:
        Model/provider:
    validations:
      required: false
