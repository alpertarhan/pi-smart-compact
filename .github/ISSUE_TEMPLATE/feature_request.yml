name: Feature request
description: Suggest an improvement to pi-smart-compact
title: "feat: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What workflow would this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior or API you would like.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - extraction
        - exploration
        - synthesis
        - verification
        - auto-trigger integration
        - dashboard/metrics
        - configuration
        - documentation
        - other
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional context
    validations:
      required: false
