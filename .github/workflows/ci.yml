name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        # Pin to the exact version declared in package.json#packageManager so
        # CI reproduces local builds deterministically (audit P0 #3).
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        # --frozen-lockfile catches accidental drift between bun.lock and
        # package.json on PRs.
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: EESV adversarial gate
        run: bun run gate

      - name: Build
        run: bun run build

  pi-latest:
    name: pi latest compatibility
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install locked baseline
        run: bun install --frozen-lockfile

      - name: Test against latest Pi
        run: bun run compat:pi
